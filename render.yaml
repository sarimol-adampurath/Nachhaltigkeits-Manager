services:
  - type: web
    name: nachhaltigkeits-manager
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
